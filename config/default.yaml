# DIB-MASAC Hyperparameters (see Table 2 in paper)

training:
  learning_rate: 3.0e-4
  gamma: 0.99
  tau: 0.005
  replay_buffer_size: 50000
  max_epochs: 20
  batch_size: 256
  seeds: [0, 1, 2, 3, 4]

model:
  latent_dim: 32
  dib_beta: 1.0e-4
  entropy_alpha: 0.2
  gradient_clip: 1.0

environment:
  inventory_risk_aversion: 0.1
  discount_rate: 0.04
  max_inventory: 10